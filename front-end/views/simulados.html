<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulado - NEEN</title>
  <link rel="stylesheet" href="/front-end/css/style.css">
</head>
<body>
  <header>
    <h1 id="simulado-titulo">Simulado</h1>
    <div id="timer">00:00</div>
  </header>

  <div id="questoes-container">
    <!-- As questões serão carregadas aqui -->
  </div>

  <button id="finalizar" onclick="finalizarSimulado()">Finalizar Simulado</button>

  <script>
    let timer;
    let minutos = 0;
    let segundos = 0;

    function atualizarTimer() {
      if (segundos === 60) {
        segundos = 0;
        minutos++;
      }

      document.getElementById('timer').innerText = 
        `${String(minutos).padStart(2, '0')}:${String(segundos).padStart(2, '0')}`;
      segundos++;
    }

    function iniciarTimer() {
      timer = setInterval(atualizarTimer, 1000);
    }

    function obterIdSimulado() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id') || 1; // Padrão para 1 caso não tenha ID na URL
    }

    async function carregarSimulado() {
      const simuladoId = obterIdSimulado();
      try {
        const response = await fetch(`/questions/${simuladoId}`);
        if (!response.ok) throw new Error('Erro ao carregar simulado');
        const simulado = await response.json();

        document.getElementById('simulado-titulo').innerText = simulado.titulo;

        const questoesContainer = document.getElementById('questoes-container');
        questoesContainer.innerHTML = ''; // Limpa antes de carregar

        simulado.questoes.forEach(questao => {
          const questaoElement = document.createElement('div');
          questaoElement.classList.add('questao');
          questaoElement.innerHTML = `
            <p>${questao.pergunta}</p>
            <ul>
              ${questao.alternativas.map(alt => 
                `<li><input type="radio" name="questao-${questao.id}" value="${alt}"> ${alt}</li>`).join('')}
            </ul>
          `;
          questoesContainer.appendChild(questaoElement);
        });
      } catch (error) {
        alert('Erro ao carregar simulado. Tente novamente.');
      }
    }

    async function finalizarSimulado() {
      clearInterval(timer);

      const respostas = [];
      document.querySelectorAll('.questao').forEach((questao, index) => {
        const selecionada = questao.querySelector(`input[name="questao-${index + 1}"]:checked`);
        respostas.push({
          idQuestao: index + 1,
          resposta: selecionada ? selecionada.value : null
        });
      });

      try {
        const response = await fetch('/submit-simulado', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idSimulado: obterIdSimulado(), respostas })
        });

        if (!response.ok) throw new Error('Erro ao enviar respostas');

        alert('Simulado finalizado e respostas enviadas!');
        window.location.href = '/resultado.html'; // Redireciona para página de resultados

      } catch (error) {
        alert('Erro ao finalizar simulado. Tente novamente.');
      }
    }

    carregarSimulado();
    iniciarTimer();
  </script>
</body>
</html>
